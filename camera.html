<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Camera Test</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
      text-align: center;
      background: #f7f7fb;
    }
    .card{
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
    }
    h1{
      margin-top: 0;
    }
    video, canvas, img{
      width: 100%;
      max-width: 480px;
      background: #000;
      border-radius: 12px;
      margin-top: 12px;
    }
    canvas{
      display:none;
    }
    .row{
      margin-top: 16px;
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
    }
    button{
      border:none;
      border-radius:10px;
      padding:12px 18px;
      font-size:16px;
      cursor:pointer;
    }
    .primary{ background:#6f42c1; color:#fff; }
    .secondary{ background:#e9ecef; color:#222; }
    #log{
      text-align:left;
      background:#f1f3f5;
      padding:12px;
      border-radius:10px;
      margin-top:16px;
      white-space:pre-wrap;
      font-size:13px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>ทดสอบกล้องบน GitHub Pages</h1>
    <p>หน้านี้โฮสต์อยู่นอก Google Apps Script เพื่อให้เปิดกล้องได้ง่ายขึ้น</p>

    <div class="row">
      <button id="startBtn" class="primary">เปิดกล้อง</button>
      <button id="snapBtn" class="secondary">ถ่ายภาพ</button>
      <button id="stopBtn" class="secondary">ปิดกล้อง</button>
    </div>

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <img id="preview" alt="ภาพตัวอย่าง" style="display:none;">

    <div id="log"></div>
  </div>

  <script>
    const startBtn = document.getElementById('startBtn');
    const snapBtn = document.getElementById('snapBtn');
    const stopBtn = document.getElementById('stopBtn');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const preview = document.getElementById('preview');
    const log = document.getElementById('log');

    let stream = null;

    function write(msg){
      const time = new Date().toLocaleTimeString();
      log.textContent += `[${time}] ${msg}\n`;
    }

    async function startCamera(){
      log.textContent = '';
      try{
        if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
          write('เบราว์เซอร์ไม่รองรับ getUserMedia');
          return;
        }

        write('กำลังขอสิทธิ์เปิดกล้อง...');
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user' },
          audio: false
        });

        video.srcObject = stream;
        await video.play();
        write('เปิดกล้องสำเร็จ');
      }catch(err){
        write('เปิดกล้องไม่สำเร็จ');
        write('Error name: ' + err.name);
        write('Error message: ' + err.message);
      }
    }

    function snapPhoto(){
      if(!stream){
        write('กรุณาเปิดกล้องก่อน');
        return;
      }

      const w = video.videoWidth || 640;
      const h = video.videoHeight || 480;
      canvas.width = w;
      canvas.height = h;

      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, w, h);

      const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
      preview.src = dataUrl;
      preview.style.display = 'block';

      write('ถ่ายภาพสำเร็จ');
    }

    function stopCamera(){
      if(stream){
        stream.getTracks().forEach(t => t.stop());
        stream = null;
        video.srcObject = null;
        write('ปิดกล้องแล้ว');
      }
    }

    startBtn.addEventListener('click', startCamera);
    snapBtn.addEventListener('click', snapPhoto);
    stopBtn.addEventListener('click', stopCamera);
  </script>
</body>
</html>
